global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: scraper-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          component: api

  - job_name: scraper-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9091
        labels:
          component: worker
